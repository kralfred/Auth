steps:
  # Step 1: Build the JAR using Gradle
  - name: 'gradle:8-jdk21'
    entrypoint: gradle
    args: ['build', '-x', 'test']
    dir: 'backend'
    # REMOVED the volumes block from here to stop the conflict

  # Step 2: Run Liquibase migrations
  - name: 'liquibase/liquibase:4.25.1'
    args:
      - '--changelog-file=db/changelog/db.changelog-master.xml'
      - '--url=jdbc:postgresql://${_DB_URL}:${_DB_PORT}/${_DB_NAME}?currentSchema=${_DB_SCHEMA}'
      - '--username=${_DB_USER}'
      - '--password=${_DB_PASSWORD}'
      - '--default-schema-name=alfabase_schema'
      - '--search-path=backend/src/main/resources/'
      - 'update'

  # Step 3: Build the Docker Image with Layer Caching
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Use the new Artifact Registry path
        docker pull europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:latest || true
        docker build \
          -t europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:$SHORT_SHA \
          -t europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:latest \
          --cache-from europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:latest \
          -f Dockerfile .

  # Step 4: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:$SHORT_SHA']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'amazing-api'
      - '--image'
      - 'europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:$SHORT_SHA'
      - '--region'
      - 'europe-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--timeout=300'
      - '--cpu=2'
      - '--memory=1Gi'
      # The ^#^ tells gcloud to use # as the separator for this dict
      - '--set-env-vars'
      - '^#^DB_HOST=${_DB_URL}#DB_PORT=${_DB_PORT}#DB_NAME=${_DB_NAME}#DB_USERNAME=${_DB_USER}#DB_PASSWORD=${_DB_PASSWORD}#JWT_SECRET=${_JWT_SECRET}#FRONTEND_URL=${_FRONTEND_URL}#SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=2#SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=alfabase_schema'

images:
  - 'europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:$SHORT_SHA'
  - 'europe-central2-docker.pkg.dev/$PROJECT_ID/amazing-repo/amazing-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  volumes:
    - name: 'gradle-cache'
      path: '/root/.gradle'