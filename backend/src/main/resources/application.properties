spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 3. Docker Compose Settings
spring.docker.compose.file=compose.yaml
spring.docker.compose.enabled=true
# Use 'active' to ensure Spring stays connected to the container it started
spring.docker.compose.lifecycle-management=start_only

app.cors.allowed-origins=${FRONTEND_URL}

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.liquibase.default-schema=public
spring.liquibase.rollback-on-error=true
logging.level.liquibase=debug

server.port=${PORT:8080}
app.security.password.min-length=12
app.security.password.require-special-chars=true

management.endpoints.web.exposure.include=refresh

spring.cloud.bootstrap.enabled=true

# Tell Spring to pass the env file to the docker command it runs
spring.docker.compose.skip.in-tests=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Optional: Disable the generation of the schema by the persistence provider
spring.jpa.generate-ddl=false



